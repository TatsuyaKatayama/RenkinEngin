[[tool]]
name = "git"
type = "shell"
environment = ["GIT_USER_NAME", "GIT_USER_EMAIL"]
install = """
RUN apt-get update && apt-get install -y git && \
    echo 'if [ -n "$GIT_USER_NAME" ]; then git config --global user.name "$GIT_USER_NAME"; fi' >> /etc/bash.bashrc && \
    echo 'if [ -n "$GIT_USER_EMAIL" ]; then git config --global user.email "$GIT_USER_EMAIL"; fi' >> /etc/bash.bashrc && \
    rm -rf /var/lib/apt/lists/*
"""
