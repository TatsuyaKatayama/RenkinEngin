instructions = """
Use python3 for post-processing.
Available libraries: foamlib, DyMat, numpy, scipy, matplotlib, pandas, optuna.

---

# DyMat Usage Guide

DyMat is a Python library for handling Modelica simulation result files (.mat).  
Below is a corrected summary of the main class, methods, and properties based on actual behavior.


## Core Class

### DyMat.DyMatFile

```
from DyMat import DyMatFile

res_mat = DyMatFile("simulation_result.mat")
```


## Main Methods (Actual Behavior)

### `res_mat.names()`
- Returns a `dict_keys` object of available variable names (not a plain list).
- You can still use: `if "varName" in res_mat.names(): ...`
- Convert to list if needed:
```
var_list = list(res_mat.names())
```

### `res_mat.data(name)`
- Returns **only the values** as a 1D NumPy array.
- Does **not** return `(time, values)`.

### `res_mat.abscissa(name)`
- Returns a tuple (e.g., length 3).
- The first element `[0]` is the NumPy array for the independent variable (usually time).
- Typical usage:
```
time = res_mat.abscissa(name)[0]
values = res_mat.data(name)
```

### `res_mat.values(name)`
- This method does **not** exist.
- Use `res_mat.data(name)` to get the values.

### `res_mat.size(name)`
- Returns the number of data points for the specified variable.


## Properties

### `res_mat.fileName`
- Name of the loaded file.

### `res_mat.nVariables`
- Number of variables in the file.

### `res_mat.nRecords`
- Number of records stored in the file.


## Example Usage (Consistent with Actual Behavior)

```
from DyMat import DyMatFile
import numpy as np

res_mat = DyMatFile("simulation_result.mat")

# Variable names (dict_keys)
names = res_mat.names()
print("Variables:", names)

# Pick a variable name
name = next(iter(names))

# Time and values
time = res_mat.abscissa(name)[0]   # NumPy array
values = res_mat.data(name)        # NumPy 1D array

print("Size:", res_mat.size(name))
print("Mean value:", np.mean(values))
```

---

"""
