[[tool]]
name = "openfoam2512"
type = "shell"
install = """
RUN apt-get update && apt-get install -y curl ca-certificates && \
    curl -s https://dl.openfoam.com/add-debian-repo.sh | bash && \
    apt-get update && \
    apt-get install -y openfoam2512-default && \
    echo "source /usr/lib/openfoam/openfoam2512/etc/bashrc" >> /etc/bash.bashrc && \
    rm -rf /var/lib/apt/lists/*
"""
instructions = """
OpenFOAM 2512 is installed.
Tutorials are located in /usr/lib/openfoam/openfoam2512/tutorials.
Source the bashrc before use: source /usr/lib/openfoam/openfoam2512/etc/bashrc
"""
