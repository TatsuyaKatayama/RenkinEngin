[[tool]]
preset = "git"

[[tool]]
name = "forgejo-mcp"
type = "shell"
environment = ["FORGEJO_URL", "FORGEJO_ACCESS_TOKEN", "FORGEJO_USER_AGENT"]
install = """
RUN apt-get update && apt-get install -y golang-go ca-certificates && \
    git clone --depth 1 https://github.com/goern/forgejo-mcp.git /tmp/forgejo-mcp && \
    cd /tmp/forgejo-mcp && \
    go build -o /usr/local/bin/forgejo-mcp . && \
    mkdir -p /root/.codex /root/.gemini && \
    printf '%s\\n' \
      '[mcp_servers.forgejo]' \
      'command = "/usr/local/bin/forgejo-mcp"' \
      'args = ["--transport", "stdio", "--url", "${FORGEJO_URL:-https://codeberg.org}"]' \
      '[mcp_servers.forgejo.env]' \
      'FORGEJO_ACCESS_TOKEN = "${FORGEJO_ACCESS_TOKEN}"' \
      'FORGEJO_USER_AGENT = "${FORGEJO_USER_AGENT}"' \
      > /root/.codex/config.toml && \
    printf '%s\\n' \
      '{' \
      '  "mcpServers": {' \
      '    "forgejo": {' \
      '      "command": "/usr/local/bin/forgejo-mcp",' \
      '      "args": ["--transport", "stdio", "--url", "${FORGEJO_URL:-https://codeberg.org}"],' \
      '      "env": {' \
      '        "FORGEJO_ACCESS_TOKEN": "${FORGEJO_ACCESS_TOKEN}",' \
      '        "FORGEJO_USER_AGENT": "${FORGEJO_USER_AGENT}"' \
      '      }' \
      '    }' \
      '  }' \
      '}' \
      > /root/.gemini/settings.json && \
    rm -rf /tmp/forgejo-mcp /var/lib/apt/lists/*
"""
