[[tool]]
name = "openmodelica410"
type = "shell"
install = """
RUN apt-get update && apt-get install -y curl ca-certificates gnupg && \
    curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc | gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg && \
    echo "deb [signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] https://build.openmodelica.org/apt noble stable" > /etc/apt/sources.list.d/openmodelica.list && \
    apt-get update && \
    apt-get install -y omc omlibrary && \
    rm -rf /var/lib/apt/lists/*
"""
instructions = """

---

# omc scripting guide (script-first, no TOC)

## Key points
- Call setCommandLineOptions before simulate.
- Use fileNamePrefix and outputFormat for result file naming and format in many OpenModelica environments.
- Confirm variables and names from SimulationResult or by parsing output files (getVariables may be unavailable in some contexts).
- Full output produces large result files; shorten stopTime or increase sampling interval when taking full output.
- Many intermediate files are generated during translation/build; run in a dedicated working directory.

## Execution order (script-first)
1. Create a working directory (e.g., workdir).
2. Call setCommandLineOptions to pass flags to OMC (before simulate).
3. Load the model (loadFile / loadModel).
4. Optionally run translateModel to perform translation/code generation.
5. Run simulate and write results into the working directory.
6. After simulation, inspect the returned SimulationResult record and/or parse the output file (.mat/.csv) to list variables and values; use external tools (Python, OMPython, scipy.io) if needed.

## Primary commands and roles
- setCommandLineOptions(options)
  - Set OMC command-line options; affects translation and debug output; call before simulate.
- loadFile("file.mo") / loadModel("Package")
  - Load model files or packages. Load MSL with loadModel("Modelica").
- translateModel(ModelName) / buildModel(ModelName)
  - Translate or build the model as needed.
- simulate(ModelName, ...)
  - Run simulation. Common arguments: startTime, stopTime, method, tolerance, outputVariables (if supported), fileNamePrefix, outputFormat.
- readSimulationResult / plot
  - Load result files and perform simple plotting; external parsing is common for automation.

## simulate main arguments (practical)
- startTime, stopTime: simulation start and stop times.
- method: solver name (e.g., "dassl").
- tolerance: numerical tolerance.
- outputVariables: set of variables to include in results (supported in some environments).
- fileNamePrefix: result file prefix (e.g., "res" → res.mat).
- outputFormat: output format ("mat", "csv", etc.).
- Note: resultFile/resultFormat appear in some docs but may not be recognized; prefer fileNamePrefix/outputFormat in practice.

## Output variable selection and verification
- Use flattened full names when specifying variables; hierarchical models may require Model.sub.var style names.
- getVariables may not be available or may not work in all OMC contexts; rely on SimulationResult or parse output files to confirm variable names.
- Array element notation and indexing can be environment-dependent; verify by inspecting output file headers or SimulationResult contents.
- If outputVariables is unsupported in your environment, parse the produced result file to extract needed variables or re-run with appropriate options.

## File size and runtime management
- Full-output runs produce large files; shorten stopTime or increase sampling interval when taking full output for debugging.
- After identifying required variables, restrict output via outputVariables (if supported) and re-run.
- outputFormat affects size and compatibility: "mat" is binary and tool-friendly; "csv" is text and more portable.

## Working directory practice
- Create a dedicated working directory per run (e.g., workdir).
- Place translation artifacts, logs, and result files under the working directory for easier cleanup.

## Recommended MOS script example (use ``` to delimit code blocks)
```
# Create working directory (use OS command)
# Example: mkdir -p workdir

# 1. Pass translation/debug options to OMC (call before simulate)
setCommandLineOptions("-d=failtrace -d=stateselection");

# 2. Load libraries and model
loadModel("Modelica", {"4.1.0"}); # Load Modelica Standard Library
loadFile("MyModel.mo");         # Load local model

# 3. Translate if needed
translateModel(MyModel);

# 4. Run simulation using fileNamePrefix and outputFormat
simulate(MyModel,
         startTime=0,
         stopTime=1,                       # shorten time when taking full output
         method="dassl",
         tolerance=1e-6,
         fileNamePrefix="workdir/res",     # output file prefix
         outputFormat="mat");              # output format
```

## Pre-run checklist
- Created working directory.
- Called setCommandLineOptions before simulate.
- Loaded required libraries (e.g., loadModel("Modelica")) and model files.
- Planned short stopTime or coarse sampling for full-output debugging.
- Set fileNamePrefix to place results in the working directory.

## Notes and caveats
- Use fileNamePrefix/outputFormat in scripts because resultFile/resultFormat may not be recognized in some OpenModelica environments.
- getVariables may be unavailable; rely on SimulationResult or output-file parsing to confirm variable names.
- Incorrect variable names cause missing data; verify headers or SimulationResult contents.
- OMC options and supported output arguments vary by OpenModelica version; consult version-specific documentation when necessary.

## References
- OpenModelica website: https://openmodelica.org/
- Users Guide — Scripting: https://openmodelica.org/doc/OpenModelicaUsersGuide/latest/scripting.html

---

"""
