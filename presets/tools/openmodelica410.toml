[[tool]]
name = "openmodelica410"
type = "shell"
install = """
RUN apt-get update && apt-get install -y curl ca-certificates gnupg && \
    curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc | gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg && \
    echo "deb [signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] https://build.openmodelica.org/apt noble stable" > /etc/apt/sources.list.d/openmodelica.list && \
    apt-get update && \
    apt-get install -y omc omlibrary && \
    rm -rf /var/lib/apt/lists/*
"""
instructions = """
OpenModelica 4.1.0 is installed.
Modelica Standard Library (MSL) 4.1.0 is available in /usr/lib/omlibrary/Modelica 4.1.0.
To use it in your Modelica code, use 'import Modelica;'.
"""
